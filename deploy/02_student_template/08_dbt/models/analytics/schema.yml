version: 2

models:
  - name: students_by_grade
    description: "Aggregates student counts and demographics per grade level"
    columns:
      - name: grade
        description: "Grade level (0-9)"
      - name: student_count
        description: "Total students in this grade"
      - name: avg_age
        description: "Average age of students in this grade"

  - name: class_enrollment
    description: "Shows enrollment vs capacity per class"
    columns:
      - name: class_id
        description: "Unique class identifier"
      - name: enrollment_pct
        description: "Percentage of capacity filled"
      - name: enrollment_status
        description: "FULL, NEARLY FULL, MODERATE, or LOW"

  - name: teacher_workload
    description: "Calculates student-to-teacher metrics"
    columns:
      - name: teacher_id
        description: "Unique teacher identifier"
      - name: workload_level
        description: "HIGH, MODERATE, or LOW based on student count"

  - name: municipality_overview
    description: "High-level KPIs for the municipality"
    columns:
      - name: municipality_code
        description: "Danish municipality code"
      - name: total_students
        description: "Total active students"
      - name: student_teacher_ratio
        description: "Students per teacher ratio"
